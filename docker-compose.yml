version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: salaoapp-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salaoappp
    ports:
      - "5432:5432"
    volumes:
      - salaoapp_pgdata:/var/lib/postgresql/data

volumes:
  salaoapp_pgdata:
